---
- name: Get current CPU usage (Linux)
  ansible.builtin.shell:
    cmd: set -o pipefail && top -b -n 1 -w512
    executable: /bin/bash
  changed_when: false
  when: cpu_remediation_os is match("rhel.*") or cpu_remediation_os == "Red Hat BYOL Linux"
  register: __cpu_remediation_usage_linux

- name: Get current CPU usage (Windows)
  ansible.windows.win_shell: "Get-Process"
  changed_when: false
  when: >-
    cpu_remediation_os is match("windows.*") or
    cpu_remediation_os is match("2016.*") or
    cpu_remediation_os == "Windows"
  register: __cpu_remediation_usage_windows

- name: Report CPU snapshot (Linux)
  ansible.builtin.debug:
    msg: "{{ __cpu_remediation_usage_linux['stdout'] }}"
    verbosity: 0
  when: __cpu_remediation_usage_linux is not skipped

- name: Report CPU snapshot (Windows)
  ansible.builtin.debug:
    msg: "{{ __cpu_remediation_usage_windows['stdout'] }}"
    verbosity: 0
  when: __cpu_remediation_usage_windows is not skipped

- name: Pass CPU data to next controller job (Linux)
  ansible.builtin.set_stats:
    data:
      service_log_output: "\"{{ __cpu_remediation_usage_linux['stdout'] }}\""
      max_tokens: "{{ cpu_remediation_max_tokens }}"
  when: __cpu_remediation_usage_linux is not skipped

- name: Pass CPU data to next controller job (Windows)
  ansible.builtin.set_stats:
    data:
      service_log_output: "\"{{ __cpu_remediation_usage_windows['stdout'] }}\""
      max_tokens: "{{ cpu_remediation_max_tokens }}"
  when: __cpu_remediation_usage_windows is not skipped
