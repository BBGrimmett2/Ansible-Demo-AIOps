---
# --- Proxmox (increase_cpu path) ---
cpu_remediation_proxmox_api_host: "{{ lookup('env', 'PROXMOX_HOST') | default('proxmox.example.com') }}"
cpu_remediation_proxmox_api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
cpu_remediation_proxmox_api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
cpu_remediation_proxmox_api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
cpu_remediation_proxmox_node: "{{ lookup('env', 'PROXMOX_NODE') | default('pve') }}"
cpu_remediation_max_increase_pct: 10   # never allocate more than this % above current cores

# Required at runtime for increase_cpu path:
# cpu_remediation_proxmox_vm_id: ""            # integer VM ID

# --- Kill top process path ---
cpu_remediation_kill_signal: "SIGTERM"
cpu_remediation_cpu_threshold: 80       # only kill if process is above this % CPU

# --- CPU check path ---
cpu_remediation_max_tokens: 8192        # max_tokens forwarded to the AI inference job via set_stats
# cpu_remediation_os: ""               # required at runtime: OS label from inventory/extra vars
                                        # e.g. "rhel9", "Red Hat BYOL Linux", "Windows", "2016 Datacenter"
