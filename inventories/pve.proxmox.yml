plugin: community.proxmox.proxmox
url: "{{ lookup('env', 'PROXMOX_HOST') }}"
user: "{{ lookup('env', 'PROXMOX_USER') }}"
token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
validate_certs: false
want_facts: true
want_proxmox_nodes_ansible_host: true
compose:
  ansible_host: inventory_hostname + '.local.starbase.icu'
  inventory_hostname: inventory_hostname + '.local.starbase.icu'