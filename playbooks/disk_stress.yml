---
- name: Stress disk I/O to trigger infrastructure alert requiring escalation
  hosts: all
  gather_facts: false
  become: true

  vars:
    disk_stress_timeout: 300     # seconds to hold the load (default: 5 min)
    disk_stress_workers: 4       # number of parallel dd workers
    disk_stress_file_size_mb: 512  # size of each temp file in MB

  tasks:
    - name: Trigger high disk I/O using dd in parallel
      ansible.builtin.shell: |
        dd if=/dev/zero of=/tmp/disk_stress_{{ item }}.tmp bs=1M count={{ disk_stress_file_size_mb }} oflag=direct
        rm -f /tmp/disk_stress_{{ item }}.tmp
      loop: "{{ range(0, disk_stress_workers, 1) | list }}"
      register: disk_stress_jobs
      changed_when: false
      async: "{{ disk_stress_timeout }}"
      poll: 0

    - name: Report stress job launched
      ansible.builtin.debug:
        msg: >-
          Stressing disk I/O with {{ disk_stress_workers }} parallel workers
          writing {{ disk_stress_file_size_mb }}MB each for {{ disk_stress_timeout }}s
          on {{ inventory_hostname }}.
          This will trigger a Dynatrace infrastructure alert that requires AI escalation
          since no disk I/O remediation templates exist.

    - name: Wait for the disk stress tasks to complete
      ansible.builtin.async_status:
        jid: "{{ async_result_item.ansible_job_id }}"
      loop: "{{ disk_stress_jobs.results }}"
      loop_control:
        loop_var: async_result_item
      register: disk_stress_poll_results
      failed_when: false
      until: disk_stress_poll_results.finished
      retries: 30
      delay: 10
