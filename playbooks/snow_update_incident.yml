---
- name: "SNOW - Update Incident"
  hosts: localhost
  gather_facts: false

  vars:
    servicenow_incident_instance_url: "{{ vault_snow_instance_url }}"
    servicenow_incident_username: "{{ vault_snow_username }}"
    servicenow_incident_password: "{{ vault_snow_password }}"

    # --- passed in from EDA / remediation workflow ---
    # servicenow_incident_number: ""          # e.g. "INC0010001"
    # servicenow_incident_state: "resolved"   # or "in_progress", "closed", etc.
    # servicenow_incident_close_notes: ""

  tasks:
    - name: Update ServiceNow incident
      ansible.builtin.import_role:
        name: servicenow_incident
        tasks_from: update
