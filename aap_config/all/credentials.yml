---
controller_credentials:

  - name: AIOps AI API
    description: OpenAI-compatible API token for AI inference
    organization: AIOps
    credential_type: AI API Token
    inputs:
      api_url: "{{ vault_ai_api_url }}"
      model: "{{ vault_ai_model }}"
      api_key: "{{ vault_ai_api_key }}"

  - name: AIOps Proxmox
    description: Proxmox VE API token for VM CPU remediation
    organization: AIOps
    credential_type: Proxmox API Token
    inputs:
      api_host: "{{ vault_proxmox_api_host }}"
      api_user: "{{ vault_proxmox_api_user }}"
      api_token_id: "{{ vault_proxmox_api_token_id }}"
      api_token_secret: "{{ vault_proxmox_token_secret }}"

  - name: AIOps ServiceNow
    description: ServiceNow instance credentials for incident management
    organization: AIOps
    credential_type: ServiceNow
    inputs:
      instance_url: "{{ vault_snow_instance_url }}"
      username: "{{ vault_snow_username }}"
      password: "{{ vault_snow_password }}"

  - name: AIOps GitHub
    description: GitHub API token for issue creation
    organization: AIOps
    credential_type: GitHub API Token
    inputs:
      token: "{{ vault_github_token }}"
      repo: "{{ vault_github_repo }}"

  - name: AIOps AAP Token
    description: AAP token used by the AI remediation playbook to launch job templates
    organization: AIOps
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ vault_aap_hostname }}"
      oauth_token: "{{ vault_aap_token }}"
      verify_ssl: true

  - name: AIOps Machine
    description: Password credential for managed Linux nodes
    organization: AIOps
    credential_type: Machine
    inputs:
      username: "{{ vault_machine_username }}"
      password: "{{ vault_machine_password }}"

  - name: AIOps SCM
    description: GitHub for Ansible SCM access
    organization: AIOps
    credential_type: scm
    inputs:
      username: "{{ vault_github_username }}"
      password: "{{ vault_github_token }}"

