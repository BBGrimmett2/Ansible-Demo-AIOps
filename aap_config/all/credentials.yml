---
# Passwords and secrets are intentionally omitted.
# Supply them via AAP vault credentials or at credential creation time.
controller_credentials:

  - name: AIOps AI API
    description: OpenAI-compatible API token for AI inference
    organization: AIOps
    credential_type: AI API Token
    inputs:
      api_url: "https://api.openai.com/v1/chat/completions"
      model: "gpt-4o"
      api_key: ""   # set in AAP — do not commit

  - name: AIOps Proxmox
    description: Proxmox VE API token for VM CPU remediation
    organization: AIOps
    credential_type: Proxmox API Token
    inputs:
      api_host: "proxmox.example.com"
      api_user: "ansible@pve"
      api_token_id: "automation"
      api_token_secret: ""   # set in AAP — do not commit

  - name: AIOps ServiceNow
    description: ServiceNow instance credentials for incident management
    organization: AIOps
    credential_type: ServiceNow
    inputs:
      instance_url: "https://instance.service-now.com"
      username: "ansible"
      password: ""   # set in AAP — do not commit

  - name: AIOps GitHub
    description: GitHub API token for issue creation
    organization: AIOps
    credential_type: GitHub API Token
    inputs:
      token: ""   # set in AAP — do not commit
      repo: "Megalith-Development/Ansible-Demo-AIOps"

  - name: AIOps AAP Token
    description: AAP token used by the AI remediation playbook to launch job templates
    organization: AIOps
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ lookup('env', 'AAP_HOSTNAME') }}"
      oauth_token: ""   # set in AAP — do not commit
      verify_ssl: true

  - name: AIOps Machine
    description: SSH credential for managed Linux nodes
    organization: AIOps
    credential_type: Machine
    inputs:
      username: ansible
      ssh_key_data: ""   # set in AAP — do not commit
