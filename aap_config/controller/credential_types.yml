---
controller_credential_types:

  - name: AI API Token
    description: OpenAI-compatible API credentials for AI inference
    kind: cloud
    inputs:
      fields:
        - id: api_url
          type: string
          label: API URL
        - id: model
          type: string
          label: Model
        - id: api_key
          type: string
          label: API Key
          secret: true
      required:
        - api_url
        - api_key
    injectors:
      extra_vars:
        ai_inference_api_url: !unsafe "{{ api_url }}"
        ai_inference_model: !unsafe "{{ model }}"
        ai_inference_api_key: !unsafe "{{ api_key }}"

  - name: Proxmox API Token
    description: Proxmox VE API token for VM management
    kind: cloud
    inputs:
      fields:
        - id: api_host
          type: string
          label: Proxmox Host
        - id: api_user
          type: string
          label: API User (USER@REALM)
        - id: api_token_id
          type: string
          label: Token ID
        - id: api_token_secret
          type: string
          label: Token Secret
          secret: true
        - id: node
          type: string
          label: Node Name
      required:
        - api_host
        - api_user
        - api_token_id
        - api_token_secret
        - node
    injectors:
      env:
        PROXMOX_HOST: !unsafe "{{ api_host }}"
        PROXMOX_USER: !unsafe "{{ api_user }}"
        PROXMOX_TOKEN_ID: !unsafe "{{ api_token_id }}"
        PROXMOX_TOKEN_SECRET: !unsafe "{{ api_token_secret }}"
        PROXMOX_NODE: !unsafe "{{ node }}"

  - name: ServiceNow
    description: ServiceNow instance credentials for ITSM operations
    kind: cloud
    inputs:
      fields:
        - id: instance_url
          type: string
          label: Instance URL
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
      required:
        - instance_url
        - username
        - password
    injectors:
      extra_vars:
        servicenow_incident_instance_url: !unsafe "{{ instance_url }}"
        servicenow_incident_username: !unsafe "{{ username }}"
        servicenow_incident_password: !unsafe "{{ password }}"
      env:
        SN_HOST: !unsafe "{{ instance_url }}"

  - name: GitHub API Token
    description: GitHub personal access token for API operations (issue creation)
    kind: cloud
    inputs:
      fields:
        - id: token
          type: string
          label: GitHub Token
          secret: true
        - id: repo
          type: string
          label: Repository (owner/repo)
      required:
        - token
        - repo
    injectors:
      extra_vars:
        github_issue_token: !unsafe "{{ token }}"
        github_issue_repo: !unsafe "{{ repo }}"
