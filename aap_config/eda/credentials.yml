eda_credentials:
  - name: AIOps SCM
    description: GitHub for Ansible SCM access
    organization: AIOps
    credential_type: Source Control
    inputs:
      username: "{{ vault_github_username }}"
      password: "{{ vault_github_token }}"

  - name: Dynatrace Token
    description: Dynatrace event stream authentication token
    organization: AIOps
    credential_type: Token Event Stream
    inputs:
      token: "{{ vault_dynatrace_token }}"
      http_header_key: Authorization

  - name: Red Hat Container Registry
    description: Red Hat Container Registry authentication token
    organization: AIOps
    credential_type: Container Registry
    inputs:
      host: registry.redhat.io
      username: "{{ vault_rh_container_registry_username }}"
      password: "{{ vault_rh_container_registry_token }}"
      verify_ssl: true

  - name: Phoenix Ansible Automation Platform
    description: AAP Controller credential for job template execution from EDA
    organization: AIOps
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ vault_phoenix_aap_host }}"
      username: "{{ vault_phoenix_aap_username }}"
      password: "{{ vault_phoenix_aap_password }}"
      verify_ssl: false